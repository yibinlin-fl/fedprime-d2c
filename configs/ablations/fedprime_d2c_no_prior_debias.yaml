experiment_name: ablation_no_prior_debias_alpha05_cr1
method_name: fedprime_d2c
seed: 0
device: auto
num_workers: 2
output_root: outputs

data:
  private_dataset: cifar10
  private_root: RAHFL-master/Dataset/cifar_10_c
  public_root: RAHFL-master/Dataset/cifar_100
  num_classes: 10
  private_corrupt_rate: 1
  test_corrupt_rate: 1
  public_size: 5000
  download_public: false
  partition: dirichlet
  dirichlet_alpha: 0.5
  private_samples_per_client: 10000

models:
  names: [ResNet10, ResNet12, ShuffleNet, Mobilenetv2]

train:
  rounds: 40
  local_epochs: 1
  batch_size: 256
  test_batch_size: 512
  public_batch_size: 256
  public_batches_per_round: 4
  optimizer: {name: adam, lr: 0.001, weight_decay: 0.0}

method:
  use_prime: true
  lambda_jsd: 12.0
  lambda_d2c: 1.0
  rho: 1.0
  use_self_gate: false
  use_complementary_kd: true
  prior_source: predicted
  prime:
    mixture_width: 3
    mixture_depth: -1
    max_depth: 3
    no_jsd: false
    enabled_primitives: [diffeo, color, filter]
  d2c:
    temperature: 3.0
    beta: 0.5
    eta: 0.5
    p_min: 0.001
    eps: 0.000001
    adaptive_beta: false
    ema_alpha:
    use_prior_debias: false
    use_class_balanced: true
    use_sample_confidence: true

