experiment_name: rahfl_prime_cifar10c_alpha05_cr1
method_name: rahfl_prime
seed: 0
device: auto
num_workers: 2
output_root: outputs

data:
  private_dataset: cifar10
  private_root: RAHFL-master/Dataset/cifar_10_c
  public_root: RAHFL-master/Dataset/cifar_100
  num_classes: 10
  private_corrupt_rate: 1
  test_corrupt_rate: 1
  public_size: 5000
  download_public: false
  partition: dirichlet
  dirichlet_alpha: 0.5
  private_samples_per_client: 10000

models:
  names: [ResNet10, ResNet12, ShuffleNet, Mobilenetv2]

train:
  rounds: 40
  local_epochs: 1
  batch_size: 256
  test_batch_size: 512
  public_batch_size: 256
  public_batches_per_round: 4
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0

method:
  use_prime: true
  lambda_jsd: 12.0
  prime:
    mixture_width: 3
    mixture_depth: -1
    max_depth: 3
    no_jsd: false
    enabled_primitives: [diffeo, color, filter]

