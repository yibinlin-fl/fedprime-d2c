experiment_name: rahfl_cifar10c_alpha05_cr1_t4
method_name: rahfl
seed: 0
device: auto
num_workers: 2
output_root: outputs

data:
  private_dataset: cifar10
  private_root: RAHFL-master/Dataset/cifar_10_c
  public_root: RAHFL-master/Dataset/cifar_100
  num_classes: 10
  private_corrupt_rate: 1
  test_corrupt_rate: 1
  public_size: 5000
  download_public: false
  partition: dirichlet
  dirichlet_alpha: 0.5
  private_samples_per_client: 10000
  partition_indices_path: outputs/partitions/cifar10c_alpha05_seed0_clients4_samples10000.npz

models:
  names: [ResNet10, ResNet12, ShuffleNet, Mobilenetv2]

train:
  rounds: 40
  local_epochs: 1
  batch_size: 64
  test_batch_size: 256
  public_batch_size: 128
  public_batches_per_round: 4
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 0.0

method:
  use_prime: false
  augmix_module: jsd
  cl_module: dcl
  lambda_jsd: 12.0

checkpoints:
  load_dir:
  resume: false
  resume_dir:
  strict: true
